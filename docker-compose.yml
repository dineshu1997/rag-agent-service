services:
  postgres:
    image: postgres:16-alpine
    container_name: rag-agent-postgres
    restart: unless-stopped
    # Credentials match application.yaml's defaults (DB_USERNAME=postgres,
    # DB_PASSWORD=admin) so the backend connects with zero extra config.
    environment:
      POSTGRES_DB: rag_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rag_agent"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-agent-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"  # REST (manual collection management, dashboard)
      - "6334:6334"  # gRPC (used by Spring AI client)
    volumes:
      - qdrant-data:/qdrant/storage

volumes:
  postgres-data:
  qdrant-data:
